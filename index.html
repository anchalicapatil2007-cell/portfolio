<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

  <!-- HEADER -->
  <div class="calc-header">
    <div class="calc-brand">CALX</div>
    <div class="mode-badge" id="modeBtn" onclick="toggleMode()">DEG</div>
  </div>

  <!-- DISPLAY -->
  <div class="display-wrapper">
    <div id="expression" class="expression"></div>
    <div id="display" class="result">0</div>
  </div>

  <!-- SCIENTIFIC PANEL -->
  <div id="sciPanel" class="sci-panel">
    <button onclick="sqrt()">√</button>
    <button onclick="square()">x²</button>
    <button onclick="cube()">x³</button>
    <button onclick="powXY()">xʸ</button>

    <button onclick="log10()">log</button>
    <button onclick="ln()">ln</button>
    <button onclick="exp()">eˣ</button>
    <button onclick="press('3.1416')">π</button>

    <button onclick="sinF()">sin</button>
    <button onclick="cosF()">cos</button>
    <button onclick="tanF()">tan</button>
    <button onclick="press('2.718')">e</button>

    <button onclick="asinF()">sin⁻¹</button>
    <button onclick="acosF()">cos⁻¹</button>
    <button onclick="atanF()">tan⁻¹</button>

    <button onclick="toggleSci()">⬇</button>
    <!-- <button class="func" onclick="toggleSci()">SCI</button> -->
  </div>

  <!-- BASIC PANEL -->
  <div class="buttons">

    <button class="ctrl" onclick="clearDisplay()">C</button>
    <button class="ctrl" onclick="del()">DEL</button>
    <button onclick="percent()">%</button>
    <button class="op" onclick="press('/')">÷</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('*')">×</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('-')">−</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="op" onclick="press('+')">+</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>

    <!-- TOGGLE -->
    <button onclick="toggleSci()">⇅</button>

    <!-- EQUAL -->
    <button class="equal" onclick="calculate()">=</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
